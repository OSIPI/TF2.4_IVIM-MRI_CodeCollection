[pytest]
# Scoped to the `uq/` analysis layer only. Pointing pytest at `uq/` makes this
# file the rootdir, so the upstream `conftest.py` (which imports nibabel and the
# OSIPI phantom test tree) is NOT collected — only the analysis tests run.
testpaths = tests
addopts = -p no:cacheprovider
filterwarnings =
    ignore::Warning
